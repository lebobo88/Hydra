name: Marketing Strategy
version: 1.0.0
deprecated_after: null   # ISO date or null; Iolaus refuses dispatch on/after this date
description: >
  Campaign strategy, integrated briefs, hypothesis framing, KPI architecture,
  channel-mix decisions. Consumes MarketBrief; emits CreativeBrief for the
  marketing-creative squad and downstream Hydra creative.
source_pack: C:\AiAppDeployments\MarketBliss
entrypoint: claude-skill
industries: [marketing, advertising, b2b-saas, dtc-ecommerce, professional-services, regulated-health-finance, creative-production, advertising-commercial]

agents:
  - slug: campaign-strategist
    role: "Integrated campaign brief author"
    authority: gatekeeper
  - slug: analytics-experimentation
    role: "Test design, MDE/power, attribution choice"
    authority: execute
  - slug: marketing-supervisor
    role: "Squad coordinator + handoff"
    authority: gatekeeper

tools:
  - name: marketing-expertise
    privilege: read
  - name: marketing-business-context
    privilege: read
  - name: creative-brief-protocol
    privilege: read
  - name: campaign-playbook
    privilege: read
  - name: experimentation-design
    privilege: read
  - name: marketing-attribution
    privilege: read

accepts:
  - MARKET_BRIEF
  - C_SUITE_DECISION_PACKET
  - HANDOFF

emits:
  - CREATIVE_BRIEF
  - DECISION_RECORD

gates:
  - rubric_id: brand-consistency
  - rubric_id: attribution-soundness

invoke:
  command_hint: "/campaign-brief"
  fallback_commands:
    - "/launch-playbook"
    - "/marketing-board"
  output_dir: "output/campaigns/{topic}/brief-{date}.md"
