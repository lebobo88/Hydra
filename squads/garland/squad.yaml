name: "Creative & Production — Eight Garland Heads"
version: 1.0.0
deprecated_after: null   # ISO date or null; Iolaus refuses dispatch on/after this date
description: >
  Eight Garland Heads crew (Calliope, Erato, Polyhymnia, Terpsichore, Euterpe, Clio,
  Urania, Helios) plus five Helios sub-agents (video-synth, audio-foley, music-score,
  dialogue-mix, governance-c2pa). Canonical source-of-truth lives at the RLM-Creative
  repo; this file is the Hydra-side copy kept in sync with it.
source_pack: https://github.com/lebobo88/RLM-Creative
entrypoint: claude-skill
best_of_n: 3   # produce 3 candidate creative drafts, judge each, Borda-rank
industries:
  - media
  - marketing
  - advertising
  - film
  - livestream
  - creator-economy

agents:
  # Crew heads
  - slug: brand-strategist
    mythic: Calliope
    role: "Brand Strategist — Crew Lead"
    authority: gatekeeper
    model_tier: opus
    agent_file: .claude/agents/calliope.md

  - slug: copywriter
    mythic: Erato
    role: "Copywriter"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/erato.md

  - slug: content-strategist
    mythic: Polyhymnia
    role: "Content Strategist"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/polyhymnia.md

  - slug: social-community
    mythic: Terpsichore
    role: "Social & Community"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/terpsichore.md

  - slug: paid-acquisition
    mythic: Euterpe
    role: "Paid Acquisition"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/euterpe.md

  - slug: pr-earned
    mythic: Clio
    role: "PR & Earned Media"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/clio.md

  - slug: seo-discovery
    mythic: Urania
    role: "SEO & Discovery"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/urania.md

  - slug: photo-cinema
    mythic: Helios
    role: "Photo & Cinema — Sub-Crew Lead"
    authority: gatekeeper
    model_tier: opus
    agent_file: .claude/agents/helios.md

  # Helios sub-agents
  - slug: video-synth
    parent: photo-cinema
    role: "Video Synthesis"
    authority: execute
    model_tier: haiku
    agent_file: .claude/agents/helios-crew/video-synth.md

  - slug: audio-foley
    parent: photo-cinema
    role: "Audio Foley & SFX"
    authority: execute
    model_tier: haiku
    agent_file: .claude/agents/helios-crew/audio-foley.md

  - slug: music-score
    parent: photo-cinema
    role: "Music Score"
    authority: execute
    model_tier: haiku
    agent_file: .claude/agents/helios-crew/music-score.md

  - slug: dialogue-mix
    parent: photo-cinema
    role: "Dialogue Mix"
    authority: execute
    model_tier: haiku
    agent_file: .claude/agents/helios-crew/dialogue-mix.md

  - slug: governance-c2pa
    parent: photo-cinema
    role: "IP Governance & C2PA Signing"
    authority: execute
    model_tier: opus
    hitl_trigger: true
    notes: "HITL required on IP-clearance failure, brand-safety failure, or any asset pending C2PA signing."
    agent_file: .claude/agents/helios-crew/governance-c2pa.md

tools:
  - name: comfyui
    privilege: execute
    notes: >
      ComfyUI node-based image/video generation pipeline.
      Use for: image generation, video synthesis, visual asset production.
      Not for: text content or copy — use gemini-content instead.
      Restricted to: Helios and video-synth agents only.
  - name: gemini-image
    privilege: execute
    notes: >
      Google Gemini image generation and editing.
      Use for: quick image drafts, concept art, visual brainstorming.
      Not for: production video — use comfyui instead.
  - name: gemini-content
    privilege: execute
    notes: >
      Google Gemini text content generation.
      Use for: copy drafts, content ideation, text-based creative.
      Not for: image/video generation — use gemini-image or comfyui instead.
  - name: frontend-design
    privilege: advisory
    notes: >
      Frontend design skill for landing-page mock-ups and component specs.
      Use for: proposing UI designs and layout concepts.
      Not for: implementation — delegate to engineering squad via Handoff.
  - name: marketing-expertise
    privilege: read
    notes: >
      Marketing domain knowledge and best practices reference.
      Use for: informing campaign strategy, audience targeting, channel selection.
      Not for: executing campaigns or generating assets.
  - name: media-business
    privilege: read
    notes: >
      Media industry knowledge, pricing models, distribution channels.
      Use for: informing media buying decisions, industry benchmarking.
      Not for: financial modeling — that belongs to the executive squad.
  - name: eights-memory
    privilege: read+write
    notes: >
      TheEights memory fabric for creative domain.
      Use for: storing/retrieving creative briefs, brand guidelines, campaign history.
      Not for: engineering or financial data. All ops require domain='creative' and at least one scope tag.

accepts:
  - CREATIVE_BRIEF
  - SHOT_LIST
  - ASSET_JOB
  - HANDOFF

emits:
  - SHOT_LIST
  - ASSET_JOB
  - DECISION_RECORD

gates:
  - rubric_id: brand-consistency
    when: always
  - rubric_id: ip-clearance
    hitl_required: true
    when: "constraints.risk_tolerance == 'low'"
  - rubric_id: media-cost-cap
    hitl_required: true
    when: "asset_job.max_render_cost_usd > 200"
  - rubric_id: brand-safety
    when: always

invoke:
  command_hint: "/creative-campaign"
  fallback_commands:
    - /photo-direction
    - /brand-refresh
    - /rlm-team
  output_dir: "RLM/output/{phase}/{topic}-{date}.md"
