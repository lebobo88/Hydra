name: Marketing Research
version: 1.0.0
deprecated_after: null   # ISO date or null; Iolaus refuses dispatch on/after this date
description: >
  Competitive intelligence, audience segmentation, SEO / content-gap mapping.
  Produces MarketBrief envelopes consumed by marketing-strategy and downstream
  squads.
source_pack: C:\AiAppDeployments\MarketBliss
entrypoint: claude-skill
industries: [marketing, advertising, b2b-saas, dtc-ecommerce, professional-services, regulated-health-finance]

agents:
  - slug: market-intelligence
    role: "Competitive intel + TAM/SAM/SOM"
    authority: advisory
  - slug: audience-persona
    role: "Persona, JTBD, segmentation"
    authority: advisory
  - slug: seo-analyst
    role: "Pillar / cluster maps + SERP analysis"
    authority: execute
  - slug: marketing-supervisor
    role: "Squad coordinator + synthesis"
    authority: gatekeeper

tools:
  - name: marketing-expertise
    privilege: read
  - name: marketing-business-context
    privilege: read
  - name: audience-segmentation
    privilege: read
  - name: semantic-seo
    privilege: read
  - name: marketing-attribution
    privilege: read

accepts:
  - HANDOFF
  - HITL_REQUEST
  - C_SUITE_DECISION_PACKET

emits:
  - DECISION_RECORD
  - MARKET_BRIEF

gates:
  - rubric_id: attribution-soundness

invoke:
  command_hint: "/market-research"
  fallback_commands:
    - "/campaign-brief"
    - "/marketing-board"
  output_dir: "output/research/{topic}-{date}.md"
