name: Engineering & Product
version: 1.0.0
deprecated_after: null   # ISO date or null; Iolaus refuses dispatch on/after this date
description: >
  Software engineering, product management, architecture, QA, DevOps. Wired to
  the pair-programmer harness — Hydra dispatches Engineering work as PP runs
  (single, best-of, team-mode, or governance-forum review).
source_pack: https://github.com/lebobo88/pair-programmer
entrypoint: mcp
industries: [software, saas, ai-platform, devtools, fintech-eng, healthtech-eng]

agents:
  - slug: pm-agent
    role: "Product manager — turns CSuiteDecisionPacket into PRD"
    authority: advisory
  - slug: architect
    role: "System architect — produces ARCH_RFC, C4 sketches"
    authority: advisory
  - slug: engineer
    role: "Implementation engineer — feature-branch PRs only"
    authority: execute
  - slug: qa-reviewer
    role: "QA + code reviewer — tests, lint, security scans"
    authority: gatekeeper
  - slug: devops-sre
    role: "DevOps & SRE — proposes infra/CI; prod deploy requires HITL"
    authority: gatekeeper

tools:
  - name: pp.harness.start_run
    mcp_server: pp_harness
    privilege: execute
    notes: >
      Start a pair-programmer run (single/team/best-of/review mode).
      Use for: initiating engineering work dispatched by Hydra.
      Not for: read-only queries or status checks.
  - name: pp.harness.start_stage
    mcp_server: pp_harness
    privilege: execute
    notes: >
      Start a specific stage within an active PP run.
      Use for: advancing through taxonomy stages (spec, design, code, test).
      Not for: starting a new run — use pp.harness.start_run instead.
  - name: pp.harness.archive_artifact
    mcp_server: pp_harness
    privilege: write
    notes: >
      Archive a produced artifact to the run's .harness directory.
      Use for: persisting spec/design/code/test artifacts after generation.
      Not for: reading or listing existing artifacts.
  - name: pp.codex.generate
    mcp_server: pp_harness
    privilege: execute
    notes: >
      Generate code or artifacts via OpenAI Codex.
      Use for: code generation when cross-vendor diversity is needed.
      Not for: critique/review — use pp.gemini.critique instead.
  - name: pp.gemini.critique
    mcp_server: pp_harness
    privilege: execute
    notes: >
      Judge/critique artifacts via Google Gemini.
      Use for: cross-vendor review of generated artifacts.
      Not for: code generation — use pp.codex.generate instead.

accepts:
  - PRD
  - ARCH_RFC
  - DEV_TASK
  - HANDOFF

emits:
  - PRD
  - ARCH_RFC
  - DEV_TASK
  - DECISION_RECORD

gates:
  - rubric_id: owasp-asvs-l1
    hitl_required: false
  - rubric_id: rfc-2119-normative
  - rubric_id: openapi-3.1-stability
  - rubric_id: slsa-l2
    hitl_required: false
    when: "phase == 'release'"

invoke:
  mode: pp_run                       # one of: pp_run | pp_team | pp_best_of | pp_review
  default_team: feature-team
  forum_for_review: change-advisory-board
  project_path: "${project_root}"
  command_hint: "/pp:run"
  # WS9: optional model_tier for this squad's default dispatch.
  # Valid tokens: haiku | sonnet | opus | fable | deep
  # "fable" and "deep" are aliases — both route to pp's deep-reasoning-team
  # (cross-vendor judges per WS6). Leave null/absent to use pp's own default.
  # IMPORTANT: Fable is operator/flag-driven only — Hydra does NOT auto-escalate
  # to Fable on retry or budget events. Set this only when the operator explicitly
  # wants every engineering dispatch from this squad to use the deep-reasoning-team.
  model_tier: ~                      # null — use pp default; override per-workflow via dispatch envelope
